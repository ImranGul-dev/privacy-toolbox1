services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: privacy
      POSTGRES_PASSWORD: privacy
      POSTGRES_DB: privacy_toolbox
    ports: ["5432:5432"]
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    env_file: ../../.env.example
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ../../apps/api:/app
      - privacy-data:/data/privacy-toolbox
    ports: ["8000:8000"]
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 20s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    env_file: ../../.env.example
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO --concurrency=2
    volumes:
      - ../../apps/api:/app
      - privacy-data:/data/privacy-toolbox
    depends_on:
      redis:
        condition: service_healthy

  beat:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    env_file: ../../.env.example
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=INFO
    volumes:
      - ../../apps/api:/app
      - privacy-data:/data/privacy-toolbox
    depends_on:
      redis:
        condition: service_healthy

  web:
    image: node:22-alpine
    working_dir: /repo/apps/web
    command: sh -c "corepack enable && pnpm config set store-dir /pnpm/store && pnpm install --frozen-lockfile=false && pnpm dev"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    volumes:
      - ../..:/repo
      - web-node-modules:/repo/node_modules
      - web-app-node-modules:/repo/apps/web/node_modules
      - web-pnpm-store:/pnpm/store
    ports: ["3000:3000"]
    depends_on: [api]

volumes:
  privacy-data: {}
  postgres-data: {}
  web-node-modules: {}
  web-app-node-modules: {}
  web-pnpm-store: {}
